<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Let's Effing Go! — Mint</title>
  <link rel="stylesheet" href="fonts/fonts.css">
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
  <main id="app">
    <header class="app-header">
      <div class="lockup">
        <img class="mascot" src="assets/mascot.png" alt="LFG mascot — the hard-hat builder">
        <h1 class="wordmark"><span class="l">L</span><span class="f">F</span><span class="g">G</span></h1>
      </div>
      <p id="status" class="status" role="status" aria-live="polite">Connecting to Discord…</p>
    </header>

    <section id="register-panel" class="card sticker" hidden>
      <h2>👋 Register your wallet</h2>
      <p class="card-sub">Drop in your XRPL address so we know where to send your build.</p>
      <input id="wallet-input" type="text" placeholder="r..." autocomplete="off"
             spellcheck="false" aria-label="XRPL wallet address">
      <button id="register-btn" class="primary">Register</button>
    </section>

    <section id="mint-panel" class="card sticker" hidden>
      <p class="wallet-line"><span class="wallet-lbl">Wallet</span> <code id="wallet-display"></code>
        <button id="change-wallet-btn" class="link">change</button></p>
      <div class="actions">
        <button id="mint-btn" class="primary big">⛏️ Mint NFT</button>
        <button id="swap-btn" class="secondary">🔁 Trait Swapper</button>
      </div>
    </section>

    <section id="swap-panel" class="card" hidden>
      <h2>🔁 Trait Swapper</h2>
      <p id="swap-help" class="card-sub">Pick two avatars of the same body — male, female, skeleton, or ape. Mismatches dim out.</p>
      <div id="nft-grid" class="nft-grid" role="group" aria-label="Your NFTs"></div>
      <button id="pick-traits-btn" class="primary big" disabled>Pick traits to swap</button>
      <p class="row-links">
        <button id="swap-back-btn" class="back">← Back</button>
      </p>
    </section>

    <section id="swap-traits-panel" class="card" hidden>
      <h2>Select traits to swap</h2>
      <div class="swap-pair">
        <figure><img id="swap-img1" alt="First selected NFT"><figcaption id="swap-name1"></figcaption></figure>
        <div class="swap-arrows" aria-hidden="true">⇄</div>
        <figure><img id="swap-img2" alt="Second selected NFT"><figcaption id="swap-name2"></figcaption></figure>
      </div>
      <div id="trait-list" class="trait-list"></div>
      <p id="swap-cost" class="cost" hidden></p>
      <button id="swap-confirm-btn" class="primary big">Swap selected traits</button>
      <p><button id="swap-cancel-btn" class="back">← Cancel</button></p>
    </section>

    <section id="swap-result-panel" class="card" hidden>
      <h2 id="swap-result-title"></h2>
      <p id="swap-result-text" class="card-sub"></p>
      <div id="swap-results"></div>
      <p><button id="swap-done-btn" class="back" hidden>← Back to the job site</button></p>
    </section>

    <section id="flow-panel" class="card" hidden>
      <ol id="flow-steps" class="steps" aria-label="Mint progress" hidden></ol>
      <p id="pay-method" class="method" hidden><span id="pay-pill" class="pill"></span></p>
      <h2 id="flow-title"></h2>
      <p id="flow-text" class="card-sub"></p>
      <div id="flow-spinner" class="spinner" role="img" aria-label="Working…" hidden></div>
      <img id="flow-qr" class="qr" alt="QR code — scan with Xaman" hidden>
      <p><button id="flow-link-btn" class="link" hidden>Open in Xaman ↗</button></p>
      <img id="nft-image" alt="Your freshly minted NFT" hidden>
      <p><button id="flow-done-btn" class="back" hidden>← Back to the job site</button></p>
    </section>
  </main>

  <div id="toasts" class="toasts" aria-live="assertive"></div>
  <script type="module" src="app.js?v=5"></script>
</body>
</html>
