name: "Feature / Enhancement"
description: "Propose a feature or improvement"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: "Problem / goal"
      description: "What are we trying to solve?"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: "Proposed solution"
      description: "Describe the solution at a high level."
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: "Acceptance criteria"
      description: "How do we know this is done?"
      placeholder: "Checklist is okay."
    validations:
      required: false
