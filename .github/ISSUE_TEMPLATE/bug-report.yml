name: "Bug / Fix"
description: "Report a bug"
labels: ["bug"]
body:
  - type: textarea
    id: happened
    attributes:
      label: "What happened"
      description: "Describe the bug."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "What you expected"
      description: "What should have happened?"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce"
      description: "Provide steps so we can reproduce the issue."
      placeholder: "1. …\n2. …\n3. …"
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "OS, browser, versions, etc."
    validations:
      required: false
