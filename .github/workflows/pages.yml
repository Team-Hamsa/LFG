# Standalone web surface (spec 2026-07-16): publish webapp/client/ to GitHub
# Pages on every prod promote (push to `deploy`), so the client at
# build.letseffinggo.com always matches the API the funnel serves. config.js
# is rewritten at deploy time to point at the public API base — the repo copy
# stays null so Discord/Telegram/dev serving is untouched.
name: Deploy web surface to GitHub Pages

on:
  push:
    branches: [deploy]
    paths:
      - 'webapp/client/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Public HTTPS route to the prod service (:8176) — the Tailscale Funnel.
  WEB_API_BASE: https://letseffinggo.tail82fcc6.ts.net/lfg

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r webapp/client/. _site/
          cat > _site/config.js <<EOF
          // Generated by .github/workflows/pages.yml — do not edit by hand.
          window.LFG_WEB = { apiBase: '${WEB_API_BASE}' };
          EOF
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("_site/.well-known/xrpl-actions.json")
          document = json.loads(path.read_text())
          for rule in document["rules"]:
              rule["apiPath"] = os.environ["WEB_API_BASE"].rstrip("/") + "/api/actions/**"
          path.write_text(json.dumps(document, indent=2) + "\n")
          PY
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
