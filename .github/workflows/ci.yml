name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    # NON-BLOCKING during Phase A/B. Remove this line at the Phase-B flip.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run gate (ruff, mypy, gitleaks, pytest)
        # The pytest hook entry is `python -m pytest`, which resolves correctly
        # here since deps are installed into the runner's system Python.
        run: pre-commit run --all-files --hook-stage pre-push --show-diff-on-failure
