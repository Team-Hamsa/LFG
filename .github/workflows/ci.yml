name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      # Legacy snapshots (legacy/) are preserved history, not active code —
      # excluded from all checks.
      - name: Compile check
        run: |
          git ls-files -z '*.py' ':!legacy/**' \
            | xargs -0 python -m py_compile

      - name: Lint (ruff, critical rules)
        run: |
          git ls-files -z '*.py' ':!legacy/**' \
            | xargs -0 ruff check --select E9,F63,F7,F82

      - name: Smoke tests
        run: python -m pytest webapp/test_smoke.py -v

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax-check client JS
        run: |
          git ls-files -z 'webapp/client/*.js' \
            | xargs -0 -n1 node --check
