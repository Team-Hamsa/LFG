name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Create venv and install dependencies
        # Build the SAME .venv the local pre-push hook expects: the mypy and
        # pytest hooks run `.venv/bin/python` so they type-check/test against the
        # real installed deps (discord.py/xrpl-py are typed). Keeps local == CI.
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt -r requirements-dev.txt

      - name: Run gate (ruff, mypy, gitleaks, pytest)
        run: .venv/bin/pre-commit run --all-files --hook-stage pre-push --show-diff-on-failure
