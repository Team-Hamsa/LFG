name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: |
          PY_FILES=$(git ls-files -z "*.py")
          if [ -n "$PY_FILES" ]; then
            echo "$PY_FILES" | xargs -0 python -m py_compile
          else
            echo "No python files"
          fi
