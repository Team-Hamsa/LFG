name: CI

on:
  push:
    branches: [main]
    # Doc-only commits (e.g. the hackathon-loc bot's README/SVG refresh) don't
    # need the CI gate. We deliberately do NOT use `[skip ci]` for that: a
    # `[skip ci]` HEAD commit skips the ENTIRE push's workflows, and since
    # promote.sh fast-forwards `deploy` to `main` (whose HEAD is almost always
    # a LoC-bot commit), that silently killed the Pages deploy on every promote.
    # paths-ignore scopes the skip to CI only, leaving pages.yml free to fire.
    paths-ignore:
      - 'README.md'
      - 'assets/**'
      # The nightly lfg-sourcetag snapshot commits only this JSON; no code
      # imports it, so it must not drag the full ruff/mypy/pytest gate.
      - 'metrics/**'
  pull_request:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Create venv and install dependencies
        # Build the SAME .venv the local pre-push hook expects: the mypy and
        # pytest hooks run `.venv/bin/python` so they type-check/test against the
        # real installed deps (discord.py/xrpl-py are typed). Keeps local == CI.
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt -r requirements-dev.txt

      - name: Run gate (ruff, mypy, gitleaks, pytest)
        # The validate-trait-config hook runs scripts/validate_trait_config.py
        # directly (not via pytest), so it doesn't get the env-guard preamble
        # test files copy (tests/test_trait_config.py etc.) — its import chain
        # (lfg_core.layer_store -> lfg_core.config) calls _require() at module
        # load time and crashes without these. CI has no .env/secrets, so
        # supply the same dummy values the test env-guard preamble uses.
        env:
          XUMM_API_KEY: test
          XUMM_API_SECRET: test
          SEED: sEdTM1uX8pu2do5XvTnutH6HsouMaM2
          TOKEN_ISSUER_ADDRESS: rrrrrrrrrrrrrrrrrrrrrhoLvTp
          TOKEN_CURRENCY_HEX: 4C46474F00000000000000000000000000000000
          BUNNY_CDN_ACCESS_KEY: test
          BUNNY_CDN_STORAGE_ZONE: test
          LAYER_SOURCE: local
          BUNNY_PULL_ZONE: nft.pullzone.example
        run: .venv/bin/pre-commit run --all-files --hook-stage pre-push --show-diff-on-failure
