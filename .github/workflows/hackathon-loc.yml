name: Hackathon LoC stats

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hackathon-loc
  cancel-in-progress: true

jobs:
  update-loc:
    runs-on: ubuntu-latest
    # Skip the run triggered by this workflow's own README commit
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update README LoC block
        run: python3 scripts/hackathon_loc.py

      - name: Update repo-vitals dashboard
        run: python3 -m scripts.readme_dashboard

      - name: Update SourceTag badge
        # metrics/sourcetag.json is pushed nightly by a separate pm2 job, not
        # this workflow — if it's missing or malformed, that's a real problem
        # to surface, but it must not fail this job and block the unrelated
        # README LoC / dashboard commits below.
        continue-on-error: true
        run: python3 -m scripts.render_sourcetag_svg

      - name: Commit if changed
        run: |
          git add README.md assets/hackathon_loc.svg assets/dashboard.svg assets/sourcetag.svg
          if ! git diff --quiet --cached; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            # NOTE: no `[skip ci]` here. A `[skip ci]` HEAD commit skips the
            # entire push's workflows, and because promote.sh fast-forwards
            # `deploy` to `main` (whose HEAD is nearly always this bot commit),
            # it silently no-op'd the Pages deploy on every promote. CI is kept
            # off doc commits via ci.yml's paths-ignore instead; this workflow
            # won't re-trigger itself (guarded by the github-actions[bot] actor
            # check above).
            git commit -m "docs(README): refresh hackathon LoC stats"
            git push
          fi
