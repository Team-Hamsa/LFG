  <rect x="348.5" y="228" width="93" height="34" rx="17.0" fill="#181818" stroke="#8957E5" stroke-width="2.5"/>
  <text x="395.0" y="251" text-anchor="middle" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="16" font-weight="700" fill="#8957E5">Discord</text>
  <rect x="455.5" y="228" width="102" height="34" rx="17.0" fill="#181818" stroke="#38A8E8" stroke-width="2.5"/>
  <text x="506.5" y="251" text-anchor="middle" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="16" font-weight="700" fill="#38A8E8">Telegram</text>
  <rect x="571.5" y="228" width="57" height="34" rx="17.0" fill="#181818" stroke="#F0D848" stroke-width="2.5"/>
