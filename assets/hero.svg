  <rect x="642.5" y="228" width="138" height="34" rx="17.0" fill="#181818" stroke="#3DA35D" stroke-width="2.5"/>
  <text x="711.5" y="251" text-anchor="middle" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="16" font-weight="700" fill="#3DA35D">Mainnet Live</text>
