[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = ["legacy", ".venv", "generated"]

[tool.ruff.lint]
# Standard sane defaults: pyflakes(F), pycodestyle(E,W), isort(I),
# pyupgrade(UP), flake8-bugbear(B), comprehensions(C4).
select = ["E", "W", "F", "I", "UP", "B", "C4"]
ignore = ["E501"]  # line-length enforced by formatter, not linter

[tool.mypy]
python_version = "3.10"
strict = true
exclude = ["^legacy/", "^\\.venv/", "^generated/", "^scripts/"]
# Keep output actionable during the Phase-B grind:
show_error_codes = true
pretty = true

# Third-party libs without type information — ignore missing imports.
# (Finalize this list from the actual baseline errors in Task 6.)
[[tool.mypy.overrides]]
module = [
    "discord.*",
    "xrpl.*",
    "xumm.*",
    "bunnycdn_storage.*",
    "BunnyCDN.*",
    "cv2.*",
    "ffmpeg.*",
    "qrcode.*",
    "moviepy.*",
    "dotenv.*",
    "aiohttp.*",
    "PIL.*",
    "pprint",
    "requests.*",
]
ignore_missing_imports = true

# Test files: relax strict annotation requirements (high cost, low value).
[[tool.mypy.overrides]]
module = ["tests.*", "webapp.test_smoke"]
disallow_untyped_defs = false
disallow_untyped_calls = false
disallow_incomplete_defs = false
warn_return_any = false
ignore_errors = true

# Production code (bot entry-point, webapp backend, DB helpers): relax the
# high-churn *annotation* requirements (full strict annotation of this legacy
# surface is low-value), but KEEP real-bug detection on — arg-type, union-attr,
# return-value, assignment, attr-defined, call-arg all still fail the gate here.
[[tool.mypy.overrides]]
module = ["main", "webapp.server", "db_helpers", "user_db"]
disallow_untyped_defs = false
disallow_untyped_calls = false
disallow_incomplete_defs = false
warn_return_any = false

# One-off / standalone ops scripts: run manually, never imported by the bot or
# webapp. Fully ignored — typing them is pure cost. Re-promote if they re-enter
# the runtime path. (ts_helpers, the old trait-swap helper, was retired to
# legacy/ — superseded by lfg_core/swap_*.py.)
[[tool.mypy.overrides]]
module = ["rarity_admin", "init_db", "scripts.*"]
ignore_errors = true
