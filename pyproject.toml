[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = ["legacy", ".venv", "generated"]

[tool.ruff.lint]
# Standard sane defaults: pyflakes(F), pycodestyle(E,W), isort(I),
# pyupgrade(UP), flake8-bugbear(B), comprehensions(C4).
select = ["E", "W", "F", "I", "UP", "B", "C4"]
ignore = ["E501"]  # line-length enforced by formatter, not linter

[tool.mypy]
python_version = "3.10"
strict = true
exclude = ["^legacy/", "^\\.venv/", "^generated/", "^scripts/"]
# Keep output actionable during the Phase-B grind:
show_error_codes = true
pretty = true

# Third-party libs without type information — ignore missing imports.
# (Finalize this list from the actual baseline errors in Task 6.)
[[tool.mypy.overrides]]
module = [
    "discord.*",
    "xrpl.*",
    "xumm.*",
    "bunnycdn_storage.*",
    "BunnyCDN.*",
    "cv2.*",
    "ffmpeg.*",
    "qrcode.*",
    "moviepy.*",
    "dotenv.*",
    "aiohttp.*",
    "PIL.*",
    "pprint",
    "requests.*",
    "telegram.*",
]
ignore_missing_imports = true

# Test files: relax strict annotation requirements (high cost, low value).
[[tool.mypy.overrides]]
module = [
    "tests.*",
    "webapp.test_smoke",
    "webapp.test_mock_economy",
    "webapp.test_economy_api",
    "webapp.test_mock_market",
    "webapp.test_market_dev_mode",
]
disallow_untyped_defs = false
disallow_untyped_calls = false
disallow_incomplete_defs = false
warn_return_any = false
ignore_errors = true

# Production code (bot entry-point, webapp backend, DB helpers): relax the
# high-churn *annotation* requirements (full strict annotation of this legacy
# surface is low-value), but KEEP real-bug detection on — arg-type, union-attr,
# return-value, assignment, attr-defined, call-arg all still fail the gate here.
[[tool.mypy.overrides]]
module = ["main", "run_telegram", "lfg_service.app", "webapp.server", "lfg_core.db_helpers", "lfg_core.user_db", "surfaces.discord_bot.*", "surfaces.telegram_bot.*", "surfaces._shared.*"]
disallow_untyped_defs = false
disallow_untyped_calls = false
disallow_incomplete_defs = false
warn_return_any = false

# (The former "standalone ops tools" override for rarity_admin/init_db is gone:
# both now live under scripts/, which the top-level `exclude` already skips.)
